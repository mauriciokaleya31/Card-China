services:
  app:
    build: .
    image: cardchina-app
    ports:
      - "${HOST_PORT:-8080}:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/id_cards.db
      # Add other environment variables here as needed
      # - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: always

volumes:
  data:
