<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EMBAIXADA DIGITAL - Sistema de Identidade</title>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      (function() {
        try {
          var originalFetch = window.fetch;
          var descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (descriptor && descriptor.configurable && !descriptor.set) {
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function(v) { console.warn('Blocked attempt to override window.fetch'); },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {}
      })();
    </script>
    <!-- DigitalPersona Web Components - Standard scripts for hardware communication -->
    <script src="https://local.digitalpersona.com:8080/WebSdk.js" defer></script>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
